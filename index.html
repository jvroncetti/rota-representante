const now = new Date();
const monthKey = now.getFullYear()+"-"+(now.getMonth()+1);

function getStore(n){return JSON.parse(localStorage.getItem(n)||"{}")}
function setStore(n,v){localStorage.setItem(n,JSON.stringify(v))}

function getVisited(){return getStore("visited")}
function getNotes(){return getStore("notes")}

function getPos(){
 let p=getStore("positivado");
 if(p.month!==monthKey){p={month:monthKey,data:{}}}
 return p
}

function savePos(p){localStorage.setItem("positivado",JSON.stringify(p))}

function toggleVisited(id){
 const v=getVisited();
 if(v[id]){
   if(confirm("Deseja desmarcar VISITA deste cliente?")){
     delete v[id];
   } else { return; }
 } else {
   v[id]=true;
 }
 setStore("visited",v);
 render();
}

function togglePos(id){
 let p=getPos();
 if(p.data[id]){
   if(confirm("Deseja remover a POSITIVAÇÃO deste cliente?")){
     delete p.data[id];
   } else { return; }
 } else {
   p.data[id]=true;
 }
 savePos(p);
 render();
}

function saveNote(id,t){
 let n=getNotes();
 n[id]=t;
 setStore("notes",n);
}

function shareCatalog(){
 const url = window.location.href.replace("index.html","catalogo.pdf");
 const wa = "https://wa.me/?text=" + encodeURIComponent("Segue nosso catálogo: " + url);
 window.open(wa,"_blank");
}

function showTab(tab,el){
 document.getElementById("rota").style.display = tab==="rota" ? "block":"none";
 document.getElementById("catalogo").style.display = tab==="catalogo" ? "block":"none";
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
}

const daySelect=document.getElementById("day");
for(let i=1;i<=10;i++){
 let o=document.createElement("option");
 o.value=i;
 o.text="Dia "+i;
 daySelect.appendChild(o);
}
daySelect.value=1;

function render(){
 const q=document.getElementById("search").value.toLowerCase();
 const d=document.getElementById("day").value;
 const visited=getVisited();
 const pos=getPos().data;
 const notes=getNotes();
 const list=document.getElementById("list");

 list.innerHTML="";

 data.filter(c=>c.Dia==d)
     .filter(c=>!q||String(c.Codigo).toLowerCase().includes(q)||c.Cliente.toLowerCase().includes(q))
     .forEach(c=>{

 const v=visited[c.Codigo];
 const p=pos[c.Codigo];
 const note=notes[c.Codigo]||"";

 const card=document.createElement("div");
 card.className="card "+(p?"green":"blue");

 card.innerHTML=`
 <div class="top">
 <div>
 <b>${c.Ordem} - ${c.Cliente}</b><br>
 <span class="code">Código: ${c.Codigo}</span>
 </div>
 <span>${p?"🟢 Positivado":"🔵 Não positivado"}</span>
 </div>

 ${c.Endereco_full}<br>

 <a class="btn" href="${c.Maps}" target="_blank">📍 Maps</a>

 <button class="btn ${v?'visit':''}" onclick="toggleVisited('${c.Codigo}')">
 ${v?'✔ Visitado':'Marcar Visita'}
 </button>

 <button class="btn pos" onclick="togglePos('${c.Codigo}')">
 ${p?'🟢 Positivado':'✔ Positivar'}
 </button>

 <button class="btn note" onclick="toggleNote('${c.Codigo}')">📝 Observação</button>

 <div id="note-${c.Codigo}" style="display:none">
 <textarea onchange="saveNote('${c.Codigo}',this.value)">${note}</textarea>
 </div>
 `;

 list.appendChild(card);

 });
}

function toggleNote(id){
 const el=document.getElementById("note-"+id);
 el.style.display = el.style.display==="none" ? "block" : "none";
}

document.getElementById("search").oninput=render;
document.getElementById("day").onchange=render;

render();

</script>
